agentic_dataops:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST', 'postgres') }}"
      user: "{{ env_var('POSTGRES_USER', 'agentic') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'agentic_pw') }}"
      port: "{{ env_var('PGPORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'warehouse') }}"
      schema: staging
      threads: 4
